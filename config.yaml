projects:
  items:
    - name: "SpareCoins"
      description: "A crypto investment mobile application that rounds up spare change from everyday transactions and automatically invests it in cryptocurrency. Think Acorns for crypto - democratizing crypto investing through micro-investing with seamless bank integration."
      highlights:
        - "Automated Crypto Investing: Connects to bank accounts to round up transaction spare change and automatically purchases cryptocurrency through Coinbase exchange integration"
        - "GraphQL-First Architecture: Built robust backend API using Golang, GraphQL, and Echo framework with OAuth authentication. Generated type-safe client code using GraphQL codegen for seamless frontend integration"
        - "Rich Mobile UX: Developed React Native frontend with Apollo GraphQL for data fetching. Created engaging user experience with custom Lottie animations for transaction flows, account linking, and investment progress visualization"
        - "Financial Integration: Implemented secure bank account connectivity using Plaid API for real-time transaction monitoring with automated round-up calculations and crypto purchase execution"
      link:
        href: "https://github.com/sherodtaylor/sparecoins"
        label: "sherodtaylor/sparecoins"
        is_private: true
      icon: "sparecoins"
      gif: "sparecoins.gif"
      demo:
        title: "SpareCoins Mobile Demo"
        description: "Interactive demonstration of the mobile application features and animations."
        preview_text: "View Live Demo"
        preview_subtitle: "Interactive mobile application showcase"
      tags: ["React Native", "Golang", "GraphQL", "Apollo", "Lottie", "OAuth", "Echo", "Plaid", "Coinbase API", "FinTech"]
    - name: "AI-First Home Lab"
      description: "Self-hosted k3s cluster I use to prototype the autonomous-agent and AI-systems patterns I care about at work. Two Claude Code agents live in the cluster as full engineering teammates, an egress credential firewall keeps real secrets at the network boundary, and the same nodes run the everyday family services so AI workloads share real production load."
      highlights:
        - "Autonomous AI Engineering Swarm: Two Claude Code agents (InfraBot for k3s/Flux, DevBot for code) run as long-lived StatefulSets, take work via Matrix chat, open and review each other's PRs, and auto-address review comments — all from a single parametric Docker image with per-agent persona overlays"
        - "Egress Credential Firewall: Agent pods only ever hold placeholder tokens — a custom iron-proxy MITM-rewrites real GitHub and Anthropic credentials at the cluster edge. A compromised agent leaks nothing useful outside the domain allowlist"
        - "MCP-Driven Observability: VictoriaMetrics and VictoriaLogs are exposed to the agents as MCP servers, so 'check the api-latency dashboard' becomes a single prompt instead of a Grafana tab"
        - "Self-Hosted LLM and Vision Stack: Ollama serves language and vision models alongside Immich face recognition over years of family photos — lets me measure the real cost and perf trade-offs of self-hosted inference before recommending anything in production"
        - "Daily Production Load: 10+ services my family depends on — Home Assistant runs the house, TrueNAS holds 8 TB of photos and documents, Jellyfin streams to every device. AI workloads share the cluster with the everyday stuff, which is the only honest test"
      link:
        href: "https://github.com/sherodtaylor/homelab"
        label: "sherodtaylor/homelab"
        is_private: false
      icon: "Server"
      gif: "homelab-dashboard.png"
      demo:
        title: "Home Lab Dashboard"
        description: "Live view of services running on the k3s cluster — AI assistants, MOC notes, media, observability, storage."
        preview_text: "View Dashboard"
        preview_subtitle: "Live service grid from the cluster"
      tags: ["AI Agents", "Claude Code", "MCP", "k3s", "Flux GitOps", "Ollama", "Immich", "Matrix", "NATS", "TrueNAS", "Home Assistant", "iron-proxy"]
    - name: "Dotfiles"
      description: "Maintained comprehensive dotfiles and development environment configurations for consistent, reproducible development setups across multiple systems."
      highlights:
        - "Cross-Platform Configuration: Unified development environment setup for macOS and Linux systems"
        - "Editor Configuration: Advanced Neovim configurations with language servers and productivity enhancements"
      link:
        href: "https://github.com/sherodtaylor/dotfiles"
        label: "sherodtaylor/dotfiles"
        is_private: false
      icon: "Settings"
      tags: ["Neovim", "Zsh", "Git", "Tmux", "Shell", "macOS", "Linux", "Docker"]

